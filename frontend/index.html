<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL Node Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --border:   #2a2a3d;
      --accent:   #7c6af7;
      --accent2:  #f7c26a;
      --text:     #e8e8f0;
      --muted:    #6b6b88;
      --ok:       #4ade80;
      --err:      #f87171;
      --warn:     #fbbf24;
      --radius:   10px;
      --mono:     'Space Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid noise texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(124,106,247,.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(247,194,106,.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 1;
      padding: 2.5rem 2rem 0;
      max-width: 860px; margin: 0 auto;
      display: flex; align-items: baseline; gap: 1rem;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    header .badge {
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: .2rem .5rem;
      border-radius: 20px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* ── Main layout ── */
    main {
      position: relative; z-index: 1;
      max-width: 860px; margin: 2rem auto 4rem;
      padding: 0 2rem;
      display: flex; flex-direction: column; gap: 1.5rem;
    }

    /* ── Panel card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.6rem;
    }
    .card-label {
      font-family: var(--mono);
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .8rem;
    }

    /* ── Input area ── */
    textarea {
      width: 100%;
      min-height: 120px;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .85rem;
      padding: .85rem 1rem;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
      line-height: 1.6;
    }
    textarea:focus { border-color: var(--accent); }

    .input-hint {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
      margin-top: .5rem;
    }

    /* ── URL row ── */
    .url-row {
      display: flex; gap: .8rem; align-items: center;
    }
    .url-row input {
      flex: 1;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .8rem;
      padding: .6rem .9rem;
      outline: none;
      transition: border-color .2s;
    }
    .url-row input:focus { border-color: var(--accent); }

    /* ── Button ── */
    button {
      font-family: var(--sans);
      font-weight: 700;
      font-size: .85rem;
      letter-spacing: .04em;
      padding: .7rem 1.6rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #9b8df9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    .btn-sm {
      padding: .5rem 1rem;
      font-size: .75rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: .5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ── */
    .error-banner {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.4);
      border-radius: var(--radius);
      padding: .85rem 1.1rem;
      color: var(--err);
      font-family: var(--mono);
      font-size: .8rem;
      display: none;
    }
    .error-banner.show { display: block; }

    /* ── Response section ── */
    #response-section { display: none; }
    #response-section.show { display: flex; flex-direction: column; gap: 1.2rem; animation: fadeUp .3s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Identity strip ── */
    .identity-strip {
      display: flex; flex-wrap: wrap; gap: .5rem;
    }
    .id-chip {
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .3rem .8rem;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
    }
    .id-chip span { color: var(--text); }

    /* ── Summary row ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .8rem;
    }
    .stat-box {
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .9rem 1rem;
      text-align: center;
    }
    .stat-box .num {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-box .lbl {
      font-size: .68rem;
      color: var(--muted);
      margin-top: .25rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    /* ── Hierarchies ── */
    .hierarchy-list {
      display: flex; flex-direction: column; gap: .8rem;
    }
    .h-card {
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .h-header {
      display: flex; align-items: center; gap: .7rem;
      padding: .75rem 1rem;
      background: #111119;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .h-header:hover { background: #15151f; }
    .root-badge {
      font-family: var(--mono);
      font-weight: 700;
      font-size: .9rem;
      background: var(--accent);
      color: #fff;
      width: 28px; height: 28px;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
    }
    .h-meta { flex: 1; }
    .h-meta .h-title { font-size: .85rem; font-weight: 700; }
    .h-meta .h-sub   { font-size: .7rem; color: var(--muted); font-family: var(--mono); }
    .cycle-tag {
      font-family: var(--mono); font-size: .65rem;
      padding: .2rem .55rem; border-radius: 20px;
      background: rgba(251,191,36,.12);
      border: 1px solid rgba(251,191,36,.3);
      color: var(--warn);
    }
    .depth-tag {
      font-family: var(--mono); font-size: .65rem;
      padding: .2rem .55rem; border-radius: 20px;
      background: rgba(74,222,128,.1);
      border: 1px solid rgba(74,222,128,.25);
      color: var(--ok);
    }
    .chevron { color: var(--muted); transition: transform .2s; font-size: .8rem; }
    .chevron.open { transform: rotate(90deg); }

    .h-body { padding: 1rem; display: none; }
    .h-body.open { display: block; }

    /* ── Tree renderer ── */
    .tree-wrap { font-family: var(--mono); font-size: .78rem; }
    .tree-node { margin-left: 1.2rem; position: relative; }
    .tree-node::before {
      content: '';
      position: absolute;
      left: -0.7rem; top: 0; bottom: 0;
      border-left: 1px solid var(--border);
    }
    .tree-row {
      display: flex; align-items: center; gap: .5rem;
      padding: .15rem 0;
      color: var(--text);
    }
    .tree-row .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .tree-row .dot.leaf { background: var(--accent2); }

    /* ── Tags row ── */
    .tags-row {
      display: flex; flex-wrap: wrap; gap: .4rem;
    }
    .tag {
      font-family: var(--mono); font-size: .72rem;
      padding: .2rem .6rem; border-radius: 4px;
      background: rgba(248,113,113,.12);
      border: 1px solid rgba(248,113,113,.25);
      color: #fca5a5;
    }
    .tag.dup {
      background: rgba(251,191,36,.1);
      border-color: rgba(251,191,36,.25);
      color: #fde68a;
    }

    /* ── JSON view ── */
    details.json-view { margin-top: .8rem; }
    details.json-view summary {
      font-family: var(--mono); font-size: .72rem; color: var(--muted);
      cursor: pointer; user-select: none;
    }
    details.json-view summary:hover { color: var(--accent); }
    pre.json-block {
      margin-top: .6rem;
      background: #07070d;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .9rem 1rem;
      font-family: var(--mono); font-size: .72rem;
      color: var(--ok);
      overflow-x: auto;
      white-space: pre;
      line-height: 1.6;
      max-height: 380px; overflow-y: auto;
    }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      text-align: center; padding-bottom: 2rem;
      font-family: var(--mono); font-size: .65rem; color: var(--muted);
    }

    @media (max-width: 500px) {
      .summary-grid { grid-template-columns: repeat(3, 1fr); }
      main { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>BFHL Explorer</h1>
  <span class="badge">v1.0</span>
</header>

<main>
  <!-- API URL config -->
  <div class="card">
    <div class="card-label">API Endpoint</div>
    <div class="url-row">
      <input id="apiUrl" type="text" value="http://localhost:3000/bfhl" placeholder="https://your-api.vercel.app/bfhl" />
      <button class="btn-sm" onclick="resetUrl()">Reset</button>
    </div>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="card-label">Node Edges Input</div>
    <textarea id="inputData" placeholder='Enter one edge per line, e.g.:&#10;A->B&#10;A->C&#10;B->D&#10;X->Y&#10;Y->Z&#10;Z->X&#10;hello&#10;1->2'></textarea>
    <div class="input-hint">One edge per line — or comma-separated list</div>
    <div style="display:flex;gap:.6rem;margin-top:1rem;align-items:center;">
      <button class="btn-primary" id="submitBtn" onclick="submitData()">
        Analyse Nodes
      </button>
      <button class="btn-sm" onclick="loadExample()">Load Example</button>
      <button class="btn-sm" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- Error -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- Response -->
  <div id="response-section">

    <!-- Identity -->
    <div class="card">
      <div class="card-label">Identity</div>
      <div class="identity-strip" id="identityStrip"></div>
    </div>

    <!-- Summary -->
    <div class="card">
      <div class="card-label">Summary</div>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>

    <!-- Hierarchies -->
    <div class="card">
      <div class="card-label">Hierarchies</div>
      <div class="hierarchy-list" id="hierarchyList"></div>
    </div>

    <!-- Invalid + Duplicates -->
    <div class="card" id="tagsCard">
      <div class="card-label">Invalid Entries &amp; Duplicate Edges</div>
      <div id="tagsContent"></div>
    </div>

    <!-- Raw JSON -->
    <div class="card">
      <div class="card-label">Raw Response</div>
      <details class="json-view" open>
        <summary>Toggle JSON</summary>
        <pre class="json-block" id="rawJson"></pre>
      </details>
    </div>

  </div>
</main>

<footer>SRM Full Stack Challenge · BFHL API Explorer</footer>

<script>
  // ── Helpers ────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function showError(msg) {
    const b = $("errorBanner");
    b.textContent = "⚠ " + msg;
    b.classList.add("show");
    $("response-section").classList.remove("show");
  }

  function clearError() {
    $("errorBanner").classList.remove("show");
  }

  function setLoading(on) {
    const btn = $("submitBtn");
    btn.disabled = on;
    btn.innerHTML = on
      ? '<span class="spinner"></span>Processing…'
      : 'Analyse Nodes';
  }

  function resetUrl() {
    $("apiUrl").value = "http://localhost:3000/bfhl";
  }

  function clearAll() {
    $("inputData").value = "";
    clearError();
    $("response-section").classList.remove("show");
  }

  function loadExample() {
    $("inputData").value = [
      "A->B","A->C","B->D","C->E","E->F",
      "X->Y","Y->Z","Z->X",
      "P->Q","Q->R",
      "G->H","G->H","G->I",
      "hello","1->2","A->"
    ].join("\n");
  }

  // ── Parse input ────────────────────────────────────────────────────────────
  function parseInput(raw) {
    return raw
      .split(/[\n,]+/)
      .map(s => s.trim())
      .filter(s => s.length > 0);
  }

  // ── Render tree ────────────────────────────────────────────────────────────
  function renderTree(treeObj, depth = 0) {
    const keys = Object.keys(treeObj);
    if (keys.length === 0 && depth === 0) {
      return '<span style="color:var(--muted);font-size:.75rem;">Empty (cycle)</span>';
    }
    let html = depth === 0 ? '<div class="tree-wrap">' : '';
    for (const key of keys) {
      const children = treeObj[key];
      const isLeaf = Object.keys(children).length === 0;
      html += `<div class="${depth === 0 ? '' : 'tree-node'}">
        <div class="tree-row">
          <span class="dot ${isLeaf ? 'leaf' : ''}"></span>
          <span>${key}</span>
        </div>
        ${Object.keys(children).length > 0 ? renderTree(children, depth + 1) : ''}
      </div>`;
    }
    if (depth === 0) html += '</div>';
    return html;
  }

  // ── Render response ────────────────────────────────────────────────────────
  function renderResponse(data) {
    // Identity
    const idFields = ['user_id','email_id','college_roll_number'];
    $("identityStrip").innerHTML = idFields.map(f =>
      `<div class="id-chip">${f}: <span>${data[f] || '—'}</span></div>`
    ).join('');

    // Summary
    const s = data.summary || {};
    $("summaryGrid").innerHTML = `
      <div class="stat-box"><div class="num">${s.total_trees ?? 0}</div><div class="lbl">Trees</div></div>
      <div class="stat-box"><div class="num">${s.total_cycles ?? 0}</div><div class="lbl">Cycles</div></div>
      <div class="stat-box"><div class="num">${s.largest_tree_root || '—'}</div><div class="lbl">Largest Root</div></div>
    `;

    // Hierarchies
    const hList = $("hierarchyList");
    hList.innerHTML = '';
    (data.hierarchies || []).forEach((h, i) => {
      const isCyclic = h.has_cycle === true;
      const card = document.createElement('div');
      card.className = 'h-card';
      card.innerHTML = `
        <div class="h-header" onclick="toggleH(${i})">
          <div class="root-badge">${h.root}</div>
          <div class="h-meta">
            <div class="h-title">Root: ${h.root}</div>
            <div class="h-sub">${isCyclic ? 'Cyclic group' : `Depth: ${h.depth} nodes`}</div>
          </div>
          ${isCyclic
            ? '<span class="cycle-tag">⟳ Cycle</span>'
            : `<span class="depth-tag">↓ ${h.depth}</span>`}
          <span class="chevron" id="chev-${i}">▶</span>
        </div>
        <div class="h-body" id="hbody-${i}">
          ${renderTree(h.tree)}
        </div>
      `;
      hList.appendChild(card);
    });

    // Invalid + Duplicates
    const inv = data.invalid_entries || [];
    const dup = data.duplicate_edges || [];
    const tagsEl = $("tagsContent");
    let tagsHtml = '';
    if (inv.length) {
      tagsHtml += `<div style="margin-bottom:.6rem">
        <div style="font-size:.68rem;color:var(--muted);font-family:var(--mono);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.06em;">Invalid (${inv.length})</div>
        <div class="tags-row">${inv.map(e => `<span class="tag">${e || '(empty)'}</span>`).join('')}</div>
      </div>`;
    }
    if (dup.length) {
      tagsHtml += `<div>
        <div style="font-size:.68rem;color:var(--muted);font-family:var(--mono);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.06em;">Duplicates (${dup.length})</div>
        <div class="tags-row">${dup.map(e => `<span class="tag dup">${e}</span>`).join('')}</div>
      </div>`;
    }
    if (!tagsHtml) tagsHtml = '<span style="font-size:.78rem;color:var(--muted)">No invalid entries or duplicates.</span>';
    tagsEl.innerHTML = tagsHtml;

    // Raw JSON
    $("rawJson").textContent = JSON.stringify(data, null, 2);

    // Show section
    $("response-section").classList.add("show");
    $("response-section").scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function toggleH(i) {
    const body = $(`hbody-${i}`);
    const chev = $(`chev-${i}`);
    body.classList.toggle('open');
    chev.classList.toggle('open');
  }

  // ── Submit ─────────────────────────────────────────────────────────────────
  async function submitData() {
    clearError();
    const raw = $("inputData").value.trim();
    if (!raw) { showError("Please enter at least one edge."); return; }

    const data = parseInput(raw);
    const url  = $("apiUrl").value.trim();
    if (!url)  { showError("Please enter the API URL above."); return; }

    setLoading(true);
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
      renderResponse(json);
    } catch (err) {
      showError(`API call failed: ${err.message}. Check the URL and CORS settings.`);
    } finally {
      setLoading(false);
    }
  }

  // Allow Enter in URL field
  $("apiUrl").addEventListener('keydown', e => { if (e.key === 'Enter') submitData(); });
</script>
</body>
</html>
